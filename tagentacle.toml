[package]
name = "container_orchestrator"
version = "0.2.0"
description = "Container lifecycle management — create, stop, list, exec via Podman/Docker API"
authors = ["Tagentacle Contributors"]
type = "executable"

[entry_points]
node = "orchestrator:main"

[dependencies]
python = ["tagentacle-py-core"]
# Install ONE of: podman (recommended) or docker
system = ["podman"]
